nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: []
        allow_headers: []
        allow_methods: []
        expose_headers: []
        max_age: 0
        hosts: []
        origin_regex: false
        forced_allow_origin_value: ~
    paths:
        '^/api/': # adjust the path according to your API's URL
            allow_origin: ['*'] # set allowed origins, or restrict to specific origins like ['http://example.com']
            allow_headers: ['*'] # set allowed headers, or restrict to specific headers
            allow_methods: ['POST', 'PUT'] # set allowed HTTP methods, or restrict to specific methods
            max_age: 3600 # set the maximum age of preflight requests